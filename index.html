<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakunawa Baybayin Rush - Salita to Baybayin</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tagalog&family=JetBrains+Mono:wght@400;600;700&display=swap');
  
  :root {
    --orange-50: #fff7ed;
    --orange-500: #f97316;
    --orange-600: #ea580c;
    --orange-700: #c2410c;
    --green-500: #22c55e;
    --red-500: #ef4444;
    --gray-900: #111827;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .baybayin {
    font-family: 'Noto Sans Tagalog', sans-serif;
    font-size: 28px;
    line-height: 1;
  }

  .game-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .track {
    position: relative;
    height: 140px;
    background: linear-gradient(180deg, rgba(249,115,22,0.1) 0%, rgba(249,115,22,0.05) 100%);
    border: 2px solid rgba(249,115,22,0.3);
    border-radius: 16px;
    margin-top: 60px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(249,115,22,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .track-line {
    position: absolute;
    bottom: 20px;
    left: 0;
    right: 0;
    height: 2px;
    background: repeating-linear-gradient(
      90deg,
      rgba(249,115,22,0.3) 0px,
      rgba(249,115,22,0.3) 10px,
      transparent 10px,
      transparent 20px
    );
  }

  .target {
    position: absolute;
    top: 30px;
    left: 0;
    display: flex;
    gap: 4px;
    padding: 12px 20px;
    background: rgba(17,24,39,0.9);
    border: 2px solid var(--orange-500);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(249,115,22,0.4), 0 0 0 1px rgba(249,115,22,0.2) inset;
    transition: transform 0.2s ease;
    will-change: left;
    z-index: 10;
  }

  .target-letter {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    color: #ff6b35;
    font-size: 28px;
    text-shadow: 0 0 10px rgba(255,107,53,0.5);
    font-family: 'Noto Sans Tagalog', sans-serif;
    line-height: 1;
  }

  .target-letter.correct {
    color: var(--green-500);
    text-shadow: 0 0 15px rgba(34,197,94,0.8);
    transform: scale(1.15);
  }

  .target-letter.glow {
    animation: pulse-glow 0.5s ease;
  }

  @keyframes pulse-glow {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); filter: brightness(1.5); }
  }

  .target.succeed {
    animation: success-pop 0.6s ease forwards;
  }

  @keyframes success-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(0); opacity: 0; }
  }

  .finish-line {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: repeating-linear-gradient(
      0deg,
      var(--red-500) 0px,
      var(--red-500) 10px,
      white 10px,
      white 20px
    );
    box-shadow: 0 0 20px rgba(239,68,68,0.6);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: rgba(17,24,39,0.6);
    border: 1px solid rgba(249,115,22,0.2);
    border-radius: 12px;
    padding: 0.75rem;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .stat-label {
    font-size: 0.7rem;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--orange-500);
  }

  .lives {
    display: flex;
    gap: 0.25rem;
    justify-content: center;
    align-items: center;
  }

  .heart {
    font-size: 1.25rem;
    transition: all 0.3s ease;
  }

  .heart.lost {
    opacity: 0.2;
    transform: scale(0.8);
  }

  .timer-bar-container {
    width: 100%;
    height: 8px;
    background: rgba(17,24,39,0.6);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 1rem;
    border: 1px solid rgba(249,115,22,0.2);
  }

  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--orange-600) 0%, var(--orange-500) 100%);
    width: 100%;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px rgba(249,115,22,0.5);
  }

  .input-section {
    margin-top: 2rem;
  }

  .prompt-word {
    text-align: center;
    margin-bottom: 1rem;
  }

  .prompt-label {
    font-size: 0.75rem;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .prompt-text {
    font-size: 2rem;
    font-weight: 700;
    color: var(--orange-500);
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(249,115,22,0.4);
  }

  .input-wrapper {
    position: relative;
  }

  .input-box {
    width: 100%;
    padding: 1rem 1.25rem;
    font-size: 1.25rem;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    text-align: center;
    background: rgba(17,24,39,0.8);
    border: 2px solid rgba(249,115,22,0.4);
    border-radius: 12px;
    color: white;
    outline: none;
    transition: all 0.2s ease;
    letter-spacing: 0.15em;
    font-weight: 600;
  }

  .input-box:focus {
    border-color: var(--orange-500);
    box-shadow: 0 0 0 3px rgba(249,115,22,0.2), 0 8px 24px rgba(249,115,22,0.15);
    transform: translateY(-1px);
  }

  .input-box.shake {
    animation: shake 0.4s ease;
    border-color: var(--red-500);
    box-shadow: 0 0 0 3px rgba(239,68,68,0.3);
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  .baybayin-preview {
    min-height: 48px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.75rem;
    background: rgba(17,24,39,0.6);
    border: 2px solid rgba(249,115,22,0.2);
    border-radius: 12px;
    font-family: 'Noto Sans Tagalog', sans-serif;
    font-size: 1.75rem;
    text-align: center;
    color: #fbbf24;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-word;
  }

  .baybayin-preview:empty::before {
    content: 'Tap Baybayin letters...';
    color: #4b5563;
    font-size: 0.875rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .btn {
    padding: 1rem 2rem;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--orange-500) 0%, var(--orange-600) 100%);
    color: white;
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(249,115,22,0.4);
  }

  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-category {
    background: rgba(17,24,39,0.8);
    border: 2px solid rgba(249,115,22,0.4);
    color: white;
    padding: 1.25rem;
    text-align: left;
    width: 100%;
    margin-bottom: 1rem;
  }

  .btn-category:hover {
    border-color: var(--orange-500);
    background: rgba(249,115,22,0.1);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(249,115,22,0.3);
  }

  .btn-category-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--orange-500);
    margin-bottom: 0.25rem;
  }

  .btn-category-desc {
    font-size: 0.875rem;
    color: #9ca3af;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 1rem;
    animation: fade-in 0.3s ease;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 2px solid rgba(249,115,22,0.3);
    border-radius: 20px;
    padding: 2rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slide-up 0.4s ease;
  }

  @keyframes slide-up {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--orange-500);
  }

  .modal-text {
    color: #d1d5db;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .hint-text {
    font-size: 0.75rem;
    color: #6b7280;
    text-align: center;
    margin-top: 0.5rem;
  }

  .baybayin-keyboard {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    max-width: 100%;
  }

  .baybayin-key {
    width: 50px;
    height: 50px;
    background: rgba(17,24,39,0.8);
    border: 2px solid rgba(249,115,22,0.3);
    border-radius: 10px;
    color: #fbbf24;
    font-family: 'Noto Sans Tagalog', sans-serif;
    font-size: 24px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    touch-action: manipulation;
  }

  .baybayin-key:active {
    transform: scale(0.92);
    background: rgba(249,115,22,0.3);
    border-color: var(--orange-500);
    box-shadow: 0 0 12px rgba(249,115,22,0.5);
  }

  .baybayin-key.backspace {
    width: 70px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.25rem;
    color: #ef4444;
  }

  .category-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }

  .game-screen {
    display: none;
  }

  .progress-indicator {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    background: rgba(249,115,22,0.2);
    border: 1px solid rgba(249,115,22,0.4);
    border-radius: 999px;
    font-size: 0.75rem;
    color: var(--orange-500);
    font-weight: 600;
    margin-left: 0.5rem;
  }

  @media (hover: hover) {
    .baybayin-key:hover {
      background: rgba(249,115,22,0.2);
      border-color: var(--orange-500);
      transform: translateY(-2px);
    }
  }

  @media (max-width: 390px) {
    .game-container {
      padding: 0.75rem;
    }
    
    .prompt-text {
      font-size: 1.5rem;
    }
    
    .baybayin {
      font-size: 24px;
    }
    
    .stat-value {
      font-size: 1.25rem;
    }

    .track {
      margin-top: 40px;
      height: 130px;
    }

    .baybayin-key {
      width: 46px;
      height: 46px;
      font-size: 22px;
    }

    .baybayin-key.backspace {
      width: 64px;
    }

    .btn-category-title {
      font-size: 1.25rem;
    }
  }
</style>
</head>
<body>
<div class="game-container">
  <!-- Category Selection Screen -->
  <div class="category-screen" id="categoryScreen">
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-bold mb-3" style="background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Bakunawa Baybayin Rush
      </h1>
      <p class="text-gray-400 text-sm">Salita to Baybayin • Pumili ng Antas</p>
    </div>
    
    <div class="max-w-md mx-auto w-full">
      <button class="btn btn-category" data-difficulty="easy">
        <div class="btn-category-title">EASY</div>
        <div class="btn-category-desc">20 tanong • 2-3 pantig</div>
      </button>
      
      <button class="btn btn-category" data-difficulty="medium">
        <div class="btn-category-title">MEDIUM</div>
        <div class="btn-category-desc">20 tanong • 3-5 pantig</div>
      </button>
      
      <button class="btn btn-category" data-difficulty="hard">
        <div class="btn-category-title">HARD</div>
        <div class="btn-category-desc">50 tanong • 4-7 pantig</div>
      </button>
    </div>
  </div>

  <!-- Game Screen -->
  <div class="game-screen" id="gameScreen">
    <header class="mb-6">
      <h1 class="text-3xl md:text-4xl font-bold text-center mb-2" style="background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Bakunawa Baybayin Rush
      </h1>
      <p class="text-center text-gray-400 text-sm">
        Salita to Baybayin
        <span class="progress-indicator" id="progressIndicator">1/20</span>
      </p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Lives</div>
        <div class="lives" id="lives">
          <span class="heart">❤️</span>
          <span class="heart">❤️</span>
          <span class="heart">❤️</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="time">60</div>
      </div>
    </div>

    <div class="timer-bar-container">
      <div class="timer-bar" id="timerBar"></div>
    </div>

    <div class="track">
      <div class="track-line"></div>
      <div class="finish-line"></div>
      <div class="target" id="target">
        <!-- Dynamic Baybayin letters here -->
      </div>
    </div>

    <div class="input-section">
      <div class="prompt-word">
        <div class="prompt-label">Type this word:</div>
        <div class="prompt-text" id="promptText">ASO</div>
      </div>
      <div class="input-wrapper">
        <div class="baybayin-preview" id="baybayinPreview"></div>
        <input 
          type="text" 
          class="input-box" 
          id="inputBox" 
          placeholder="I Type ang Baybayin..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          disabled
        >
      </div>
      <div class="baybayin-keyboard" id="baybayinKeyboard">
        <button class="baybayin-key" data-char="ᜀ">ᜀ</button>
        <button class="baybayin-key" data-char="ᜁ">ᜁ</button>
        <button class="baybayin-key" data-char="ᜂ">ᜂ</button>
        <button class="baybayin-key" data-char="ᜊ">ᜊ</button>
        <button class="baybayin-key" data-char="ᜃ">ᜃ</button>
        <button class="baybayin-key" data-char="ᜇ">ᜇ</button>
        <button class="baybayin-key" data-char="ᜄ">ᜄ</button>
        <button class="baybayin-key" data-char="ᜑ">ᜑ</button>
        <button class="baybayin-key" data-char="ᜎ">ᜎ</button>
        <button class="baybayin-key" data-char="ᜋ">ᜋ</button>
        <button class="baybayin-key" data-char="ᜈ">ᜈ</button>
        <button class="baybayin-key" data-char="ᜅ">ᜅ</button>
        <button class="baybayin-key" data-char="ᜉ">ᜉ</button>
        <button class="baybayin-key" data-char="ᜐ">ᜐ</button>
        <button class="baybayin-key" data-char="ᜆ">ᜆ</button>
        <button class="baybayin-key" data-char="ᜏ">ᜏ</button>
        <button class="baybayin-key" data-char="ᜌ">ᜌ</button>
        <button class="baybayin-key" data-char="ᜒ">ᜒ</button>
        <button class="baybayin-key" data-char="ᜓ">ᜓ</button>
        <button class="baybayin-key" data-char="᜔">᜔</button>
        <button class="baybayin-key backspace" data-action="backspace">⌫</button>
      </div>
      <div class="hint-text">Tap Baybayin to type • Match exact spelling with kudlit/virama</div>
    </div>

    <div class="mt-auto pt-6">
      <button class="btn btn-primary w-full" id="quitBtn">Back to Menu</button>
    </div>
  </div>
</div>

<div class="modal" id="modal" style="display: none;">
  <div class="modal-content">
    <h2 class="modal-title" id="modalTitle">Game Over</h2>
    <p class="modal-text" id="modalText">Your score: 0</p>
    <button class="btn btn-primary w-full" id="retryBtn">Back to Menu</button>
  </div>
</div>

<script>
  // Word lists per difficulty
  const WORD_LISTS = {
    easy: ['ASO','PUSA','BATA','MATA','KAMA','AMA','INA','ISA','UPO','TAO','BUKO','GABI','ULAP','ILAW','APOY','BATO','LANGIT','DAGAT','LUPA','ISDA'],
    medium: ['BUKAS','SARADO','MAHAL','GULAY','PRUTAS','BAHAY','KUBO','BINTANA','PINTUAN','HAGDANAN','SILID','KUSINA','KAMAY','PAA','ULO','MUKHA','BUHOK','DAMIT','SAPATOS','KAPATID'],
    hard: ['MAGANDANG UMAGA','SALAMAT','PAALAM','INUMIN','PAGKAIN','TANGGHALIAN','HAPUNAN','ALMUSAL','NAGLALAKAD','TUMATAKBO','NAKANGITI','PAMILYA','KAIBIGAN','KASINTAHAN','MAGLALABA','MAGLULUTO','UMIIYAK','TUMATAWA','NAGLALARO','NAGBABASA','UMAGA','GABI','HAPON','BUKAS','KAHAPON','MAMAYA','NGAYON','DOON','DITO','DIYAN','KANINA','PAROON','PAKAININ','UMINOM','KUMAIN','MATULOG','GUMISING','MAGLARO','MAGBASA','MAGSULAT','MAGLINIP','LUMANGOY','UMAWIT','SUMAYAW','MAGDASAL','MAGTRABAHO','ESTUDYANTE','GURO','PAARALAN']
  };

  // Fixed Baybayin mapping with correct virama/kudlit - EXACT MATCH REQUIRED
  const BAYBAYIN_DICT = {
    'ASO': 'ᜀᜐᜓ',
    'PUSA': 'ᜉᜓᜐ',
    'BATA': 'ᜊᜆ',
    'MATA': 'ᜋᜆ',
    'KAMA': 'ᜃᜋ',
    'AMA': 'ᜀᜋ',
    'INA': 'ᜁᜈ',
    'ISA': 'ᜁᜐ',
    'UPO': 'ᜂᜉᜓ',
    'TAO': 'ᜆᜂ',
    'BUKO': 'ᜊᜓᜃᜓ',
    'GABI': 'ᜄᜊᜒ',
    'ULAP': 'ᜂᜎᜉ᜔',
    'ILAW': 'ᜁᜎᜏ᜔',
    'APOY': 'ᜀᜉᜓᜌ᜔',
    'BATO': 'ᜊᜆᜓ',
    'LANGIT': 'ᜎᜅᜒᜆ᜔',
    'DAGAT': 'ᜇᜄᜆ᜔',
    'LUPA': 'ᜎᜓᜉ',
    'ISDA': 'ᜁᜐ᜔ᜇ',
    'BUKAS': 'ᜊᜓᜃᜐ᜔',
    'SARADO': 'ᜐᜇᜇᜓ',
    'MAHAL': 'ᜋᜑᜎ᜔',
    'GULAY': 'ᜄᜓᜎᜌ᜔',
    'PRUTAS': 'ᜉ᜔ᜇᜓᜆᜐ᜔',
    'BAHAY': 'ᜊᜑᜌ᜔',
    'KUBO': 'ᜃᜓᜊᜓ',
    'BINTANA': 'ᜊᜒᜈ᜔ᜆᜈ',
    'PINTUAN': 'ᜉᜒᜈ᜔ᜆᜓᜀᜈ᜔',
    'HAGDANAN': 'ᜑᜄ᜔ᜇᜈ᜔',
    'SILID': 'ᜐᜒᜎᜒᜇ᜔',
    'KUSINA': 'ᜃᜓᜐᜒᜈ',
    'KAMAY': 'ᜃᜋᜌ᜔',
    'PAA': 'ᜉᜀ',
    'ULO': 'ᜂᜎᜓ',
    'MUKHA': 'ᜋᜓᜃ᜔ᜑ',
    'BUHOK': 'ᜊᜓᜑᜓᜃ᜔',
    'DAMIT': 'ᜇᜋᜒᜆ᜔',
    'SAPATOS': 'ᜐᜉᜆᜓᜐ᜔',
    'KAPATID': 'ᜃᜉᜆᜒᜇ᜔'
  };

  const GAME_DURATION = 60000; // 60 seconds
  const MAX_LIVES = 3;
  
  let gameState = 'idle';
  let difficulty = null;
  let wordList = [];
  let currentWordIndex = 0;
  let totalQuestions = 0;
  let currentWord = '';
  let currentBaybayinString = '';
  let currentBaybayinChars = [];
  let score = 0;
  let lives = MAX_LIVES;
  let currentInput = '';
  let startTime = 0;
  let animationFrame = null;
  let trackWidth = 0;

  const categoryScreen = document.getElementById('categoryScreen');
  const gameScreen = document.getElementById('gameScreen');
  const target = document.getElementById('target');
  const inputBox = document.getElementById('inputBox');
  const baybayinPreview = document.getElementById('baybayinPreview');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const timeEl = document.getElementById('time');
  const timerBar = document.getElementById('timerBar');
  const promptText = document.getElementById('promptText');
  const progressIndicator = document.getElementById('progressIndicator');
  const quitBtn = document.getElementById('quitBtn');
  const modal = document.getElementById('modal');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const retryBtn = document.getElementById('retryBtn');
  const keyboard = document.getElementById('baybayinKeyboard');

  function init() {
    updateTrackWidth();
    window.addEventListener('resize', updateTrackWidth);
    
    document.querySelectorAll('[data-difficulty]').forEach(btn => {
      btn.addEventListener('click', () => startGame(btn.dataset.difficulty));
    });
    
    quitBtn.addEventListener('click', quitToMenu);
    retryBtn.addEventListener('click', quitToMenu);
    inputBox.addEventListener('input', handleInput);
    inputBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') return;
      if (gameState !== 'playing') e.preventDefault();
    });
    keyboard.addEventListener('click', handleKeyboardTap);
    keyboard.addEventListener('touchstart', handleKeyboardTap, { passive: false });
  }

  function updateTrackWidth() {
    const track = document.querySelector('.track');
    if (track && target) {
      trackWidth = track.offsetWidth - target.offsetWidth - 8;
    }
  }

  function toBaybayin(word) {
    const upperWord = word.replace(/ /g, '');
    
    // Use explicit dictionary for known words
    if (BAYBAYIN_DICT[upperWord]) {
      const str = BAYBAYIN_DICT[upperWord];
      return { str, chars: Array.from(str) };
    }
    
    // Fallback: basic syllabic conversion without kudlit for unknown words
    let result = '';
    let i = 0;
    
    while (i < upperWord.length) {
      const char = upperWord[i];
      if (char === 'A') result += 'ᜀ';
      else if (char === 'E' || char === 'I') result += 'ᜁ';
      else if (char === 'O' || char === 'U') result += 'ᜂ';
      else result += 'ᜊ';
      i++;
    }
    
    return { str: result, chars: Array.from(result) };
  }

  function startGame(diff) {
    difficulty = diff;
    wordList = [...WORD_LISTS[diff]];
    totalQuestions = diff === 'hard' ? 50 : 20;
    
    for (let i = wordList.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [wordList[i], wordList[j]] = [wordList[j], wordList[i]];
    }
    
    currentWordIndex = 0;
    gameState = 'playing';
    score = 0;
    lives = MAX_LIVES;
    
    categoryScreen.style.display = 'none';
    gameScreen.style.display = 'block';
    
    loadNextWord();
    updateUI();
    
    startTime = Date.now();
    inputBox.disabled = false;
    inputBox.focus();
    gameLoop();
  }

  function loadNextWord() {
    if (currentWordIndex >= totalQuestions || currentWordIndex >= wordList.length) {
      endGame(true, 'Completed all questions!');
      return;
    }
    
    currentWord = wordList[currentWordIndex];
    const baybayin = toBaybayin(currentWord);
    currentBaybayinString = baybayin.str;
    currentBaybayinChars = baybayin.chars;
    currentInput = '';
    
    promptText.textContent = currentWord;
    inputBox.value = '';
    inputBox.placeholder = `Type in Baybayin...`;
    baybayinPreview.textContent = '';
    
    target.innerHTML = '';
    currentBaybayinChars.forEach((char, idx) => {
      const span = document.createElement('span');
      span.className = 'target-letter baybayin';
      span.dataset.index = idx;
      span.textContent = char;
      target.appendChild(span);
    });
    
    target.classList.remove('succeed');
    target.style.left = '0px';
    target.style.display = 'flex';
    
    progressIndicator.textContent = `${currentWordIndex + 1}/${totalQuestions}`;
    
    setTimeout(() => {
      updateTrackWidth();
    }, 50);
  }

  function resetTarget() {
    const letters = target.querySelectorAll('.target-letter');
    letters.forEach(letter => {
      letter.classList.remove('correct', 'glow');
    });
    target.classList.remove('succeed');
    target.style.left = '0px';
    currentInput = '';
    inputBox.value = '';
    baybayinPreview.textContent = '';
  }

  function gameLoop() {
    if (gameState !== 'playing') return;

    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / GAME_DURATION, 1);
    const position = progress * trackWidth;
    
    target.style.left = position + 'px';
    
    const timeLeft = Math.max(0, Math.ceil((GAME_DURATION - elapsed) / 1000));
    timeEl.textContent = timeLeft;
    timerBar.style.width = (100 - progress * 100) + '%';

    if (progress >= 1) {
      loseLife('Time up!');
      return;
    }

    animationFrame = requestAnimationFrame(gameLoop);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    const value = e.target.value;
    
    if (value.length < currentInput.length) {
      currentInput = value;
      baybayinPreview.textContent = value;
      updateLetterStates();
      return;
    }

    // Check if the input matches the exact expected Baybayin string prefix
    if (currentBaybayinString.startsWith(value)) {
      currentInput = value;
      baybayinPreview.textContent = value;
      updateLetterStates();
      
      // Check for exact match including virama/kudlit
      if (value === currentBaybayinString) {
        successRound();
      }
    } else {
      inputBox.value = currentInput;
      shakeInput();
      loseLife('Wrong character!');
    }
  }

  function handleKeyboardTap(e) {
    if (gameState !== 'playing') return;
    
    const keyBtn = e.target.closest('.baybayin-key');
    if (!keyBtn) return;
    
    e.preventDefault();
    
    if (keyBtn.dataset.action === 'backspace') {
      handleBackspace();
      return;
    }
    
    const baybayinChar = keyBtn.dataset.char;
    if (!baybayinChar) return;
    
    handleBaybayinInput(baybayinChar);
  }

  function handleBaybayinInput(char) {
    const newInput = currentInput + char;
    
    // Check exact prefix match including diacritics
    if (currentBaybayinString.startsWith(newInput)) {
      currentInput = newInput;
      inputBox.value = currentInput;
      baybayinPreview.textContent = currentInput;
      updateLetterStates();
      
      // Exact string match required
      if (newInput === currentBaybayinString) {
        successRound();
      }
    } else {
      shakeInput();
      loseLife('Wrong character!');
    }
  }

  function handleBackspace() {
    if (currentInput.length === 0) return;
    
    currentInput = currentInput.slice(0, -1);
    inputBox.value = currentInput;
    baybayinPreview.textContent = currentInput;
    updateLetterStates();
  }

  function updateLetterStates() {
    const letters = target.querySelectorAll('.target-letter');
    const inputLength = currentInput.length;
    
    letters.forEach((letter, idx) => {
      if (idx < inputLength && currentInput[idx] === currentBaybayinChars[idx]) {
        if (!letter.classList.contains('correct')) {
          letter.classList.add('correct', 'glow');
          setTimeout(() => letter.classList.remove('glow'), 500);
        }
      } else {
        letter.classList.remove('correct');
      }
    });
  }

  function successRound() {
    score += 100;
    currentWordIndex++;
    updateUI();
    
    target.classList.add('succeed');
    inputBox.disabled = true;
    
    setTimeout(() => {
      if (gameState !== 'playing') return;
      
      if (currentWordIndex >= totalQuestions) {
        endGame(true, 'Perfect run!');
        return;
      }
      
      loadNextWord();
      inputBox.disabled = false;
      inputBox.focus();
    }, 600);
  }

  function shakeInput() {
    inputBox.classList.add('shake');
    setTimeout(() => inputBox.classList.remove('shake'), 400);
  }

  function loseLife(reason) {
    lives--;
    updateUI();
    
    if (lives <= 0) {
      endGame(false, reason);
    } else {
      cancelAnimationFrame(animationFrame);
      startTime = Date.now();
      resetTarget();
      inputBox.focus();
      gameLoop();
    }
  }

  function endGame(won, reason = '') {
    gameState = 'ended';
    cancelAnimationFrame(animationFrame);
    inputBox.disabled = true;
    inputBox.blur();
    
    const questionsDone = currentWordIndex;
    modalTitle.textContent = won ? 'Perfect!' : 'Game Over';
    modalText.textContent = `${reason} Final Score: ${score} | Questions: ${questionsDone}/${totalQuestions}`;
    modal.style.display = 'flex';
  }

  function quitToMenu() {
    cancelAnimationFrame(animationFrame);
    modal.style.display = 'none';
    gameScreen.style.display = 'none';
    categoryScreen.style.display = 'flex';
    gameState = 'idle';
    target.style.left = '0px';
    timerBar.style.width = '100%';
    timeEl.textContent = '60';
    resetTarget();
  }

  function updateUI() {
    scoreEl.textContent = score;
    
    const hearts = livesEl.querySelectorAll('.heart');
    hearts.forEach((heart, idx) => {
      if (idx >= lives) {
        heart.classList.add('lost');
      } else {
        heart.classList.remove('lost');
      }
    });
  }

  init();
</script>

</body>
